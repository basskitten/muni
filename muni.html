<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Muni">
<title>Muni Arrivals</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --text: #eee;
  --text-dim: #8899aa;
  --K: #569BBE;
  --L: #92278F;
  --M: #008752;
}

html, body {
  height: 100%;
  font-family: -apple-system, system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ---- Header ---- */
header {
  display: flex;
  align-items: center;
  padding: 16px;
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 10;
}
#menuBtn {
  background: none; border: none; color: var(--text);
  font-size: 28px; padding: 8px; cursor: pointer;
  line-height: 1;
}
#stopName {
  flex: 1;
  text-align: center;
  font-size: 18px;
  font-weight: 600;
}
#refreshBtn {
  background: none; border: none; color: var(--text);
  font-size: 24px; padding: 8px; cursor: pointer;
}
#refreshBtn.spinning { animation: spin 0.8s linear; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- Slide-out menu ---- */
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 20;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
#overlay.open { opacity: 1; pointer-events: auto; }

#menu {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: 280px;
  background: var(--surface);
  z-index: 30;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
  padding: 24px 0;
  overflow-y: auto;
}
#menu.open { transform: translateX(0); }
#menu h2 {
  padding: 0 20px 16px;
  font-size: 16px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.menu-item {
  display: block; width: 100%;
  background: none; border: none; color: var(--text);
  text-align: left;
  padding: 16px 20px;
  font-size: 18px;
  cursor: pointer;
}
.menu-item:hover, .menu-item.active {
  background: rgba(255,255,255,0.08);
}
.menu-divider {
  height: 1px;
  background: rgba(255,255,255,0.1);
  margin: 12px 20px;
}
.menu-item.settings-item {
  color: var(--text-dim);
  font-size: 15px;
}

/* ---- Arrivals ---- */
#arrivals {
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.arrival-row {
  display: flex;
  align-items: center;
  gap: 20px;
}

.line-badge {
  width: 64px; height: 64px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}

.arrival-time {
  font-size: 52px;
  font-weight: 700;
  line-height: 1;
}
.arrival-time .unit {
  font-size: 24px;
  font-weight: 400;
  color: var(--text-dim);
  margin-left: 4px;
}

/* ---- Status bar ---- */
#status {
  padding: 16px;
  text-align: center;
  color: var(--text-dim);
  font-size: 14px;
}

/* ---- Messages ---- */
.message {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-dim);
  font-size: 20px;
  line-height: 1.5;
}
.message.error { color: #e74c3c; }

/* ---- Setup screen ---- */
#setup {
  padding: 32px 24px;
  max-width: 400px;
  margin: 0 auto;
}
#setup h1 {
  font-size: 24px;
  margin-bottom: 8px;
}
#setup p {
  color: var(--text-dim);
  margin-bottom: 24px;
  line-height: 1.5;
}
#setup input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  margin-bottom: 16px;
}
#setup button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 8px;
  background: var(--K);
  color: #fff;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
}

/* ---- Refresh countdown ---- */
#countdown {
  display: inline;
}
</style>
</head>
<body>

<div id="overlay" onclick="closeMenu()"></div>
<nav id="menu">
  <h2>Stops</h2>
  <div id="menuStops"></div>
  <div class="menu-divider"></div>
  <button class="menu-item settings-item" onclick="showSetup()">Change API Key</button>
</nav>

<div id="app" style="display:none">
  <header>
    <button id="menuBtn" onclick="openMenu()" aria-label="Menu">&#9776;</button>
    <span id="stopName"></span>
    <button id="refreshBtn" onclick="refresh()" aria-label="Refresh">&#8635;</button>
  </header>
  <div id="arrivals"></div>
  <div id="status"></div>
</div>

<div id="setup" style="display:none">
  <h1>Muni Arrivals</h1>
  <p>Paste your 511.org API key below. Get a free one at
    <strong>511.org/open-data/token</strong></p>
  <input id="apiKeyInput" type="text" placeholder="Your 511.org API key" autocomplete="off">
  <button onclick="saveApiKey()">Save</button>
</div>

<script>
// =====================================================================
// CONFIGURATION - edit these to match your commute
// =====================================================================
const STOPS = [
  { name: "Castro East",         stopCode: "15728" },
  { name: "Montgomery West",     stopCode: "16994" },
  { name: "Castro West",         stopCode: "16991" },
  { name: "Montgomery East",     stopCode: "15731" },
];

const AGENCY = "SF";

const LINES = {
  K: { color: "#569BBE" },
  L: { color: "#92278F" },
  M: { color: "#008752" },
};

const REFRESH_SECONDS = 30;

// =====================================================================
// STATE
// =====================================================================
let currentStopIndex = 0;
let refreshTimer = null;
let countdownTimer = null;
let secondsLeft = 0;

// =====================================================================
// STARTUP
// =====================================================================
function init() {
  const key = localStorage.getItem("muni_api_key");
  if (!key) {
    showSetup();
    return;
  }
  const saved = localStorage.getItem("muni_stop_index");
  if (saved !== null && saved < STOPS.length) currentStopIndex = parseInt(saved);
  showApp();
}

function showSetup() {
  closeMenu();
  document.getElementById("setup").style.display = "block";
  document.getElementById("app").style.display = "none";
  const existing = localStorage.getItem("muni_api_key");
  if (existing) document.getElementById("apiKeyInput").value = existing;
}

function saveApiKey() {
  const key = document.getElementById("apiKeyInput").value.trim();
  if (!key) return;
  localStorage.setItem("muni_api_key", key);
  showApp();
}

function showApp() {
  document.getElementById("setup").style.display = "none";
  document.getElementById("app").style.display = "block";
  buildMenu();
  selectStop(currentStopIndex);
}

// =====================================================================
// MENU
// =====================================================================
function buildMenu() {
  const container = document.getElementById("menuStops");
  container.innerHTML = "";
  STOPS.forEach((stop, i) => {
    const btn = document.createElement("button");
    btn.className = "menu-item";
    btn.textContent = stop.name;
    btn.onclick = () => { selectStop(i); closeMenu(); };
    container.appendChild(btn);
  });
}

function openMenu() {
  document.getElementById("menu").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}

function closeMenu() {
  document.getElementById("menu").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

function selectStop(index) {
  currentStopIndex = index;
  localStorage.setItem("muni_stop_index", index);
  document.getElementById("stopName").textContent = STOPS[index].name;

  // highlight active menu item
  document.querySelectorAll("#menuStops .menu-item").forEach((el, i) => {
    el.classList.toggle("active", i === index);
  });

  refresh();
}

// =====================================================================
// DATA FETCHING
// =====================================================================
async function refresh() {
  const btn = document.getElementById("refreshBtn");
  btn.classList.add("spinning");
  setTimeout(() => btn.classList.remove("spinning"), 800);

  clearInterval(refreshTimer);
  clearInterval(countdownTimer);

  const stop = STOPS[currentStopIndex];
  const key = localStorage.getItem("muni_api_key");
  const url = `https://api.511.org/transit/StopMonitoring?api_key=${encodeURIComponent(key)}&agency=${AGENCY}&stopCode=${stop.stopCode}&format=json`;

  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    // 511.org sometimes returns a UTF-8 BOM — strip it
    let text = await resp.text();
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

    const data = JSON.parse(text);
    const delivery = data.ServiceDelivery?.StopMonitoringDelivery;
    // delivery can be an object or an array
    const visits = (Array.isArray(delivery)
      ? delivery[0]?.MonitoredStopVisit
      : delivery?.MonitoredStopVisit) || [];

    renderArrivals(visits);
    showStatus("Updated " + new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }));
  } catch (err) {
    if (err.message.includes("Failed to fetch") || err.message.includes("NetworkError")) {
      showError("Network error. Check your connection, or 511.org may be blocking browser requests (CORS). See console for details.");
    } else {
      showError("Error: " + err.message);
    }
    console.error("Fetch failed:", err);
  }

  // schedule next refresh
  secondsLeft = REFRESH_SECONDS;
  refreshTimer = setTimeout(refresh, REFRESH_SECONDS * 1000);
  countdownTimer = setInterval(updateCountdown, 1000);
}

function updateCountdown() {
  secondsLeft = Math.max(0, secondsLeft - 1);
  const el = document.getElementById("countdown");
  if (el) el.textContent = `(${secondsLeft}s)`;
}

// =====================================================================
// RENDERING
// =====================================================================
function renderArrivals(visits) {
  const container = document.getElementById("arrivals");
  const now = Date.now();

  // filter to K/L/M and future arrivals
  const arrivals = visits
    .map(v => {
      const j = v.MonitoredVehicleJourney;
      const call = j?.MonitoredCall;
      const line = j?.LineRef;
      const timeStr = call?.ExpectedArrivalTime || call?.ExpectedDepartureTime
                   || call?.AimedArrivalTime || call?.AimedDepartureTime;
      if (!line || !timeStr) return null;
      const minutes = Math.round((new Date(timeStr).getTime() - now) / 60000);
      return { line, minutes };
    })
    .filter(a => a && LINES[a.line] && a.minutes >= 0)
    .sort((a, b) => a.minutes - b.minutes);

  if (arrivals.length === 0) {
    container.innerHTML = '<div class="message">No upcoming K / L / M trains</div>';
    return;
  }

  container.innerHTML = arrivals.map(a => `
    <div class="arrival-row">
      <div class="line-badge" style="background:${LINES[a.line].color}">${a.line}</div>
      <div class="arrival-time">
        ${a.minutes === 0 ? "Now" : a.minutes + '<span class="unit">min</span>'}
      </div>
    </div>
  `).join("");
}

function showStatus(msg) {
  document.getElementById("status").innerHTML =
    msg + ' <span id="countdown">(' + REFRESH_SECONDS + 's)</span>';
}

function showError(msg) {
  document.getElementById("arrivals").innerHTML =
    '<div class="message error">' + msg + '</div>';
  document.getElementById("status").textContent = "";
}

// =====================================================================
// VISIBILITY — pause refresh when backgrounded, resume when foregrounded
// =====================================================================
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    clearTimeout(refreshTimer);
    clearInterval(countdownTimer);
  } else {
    refresh();
  }
});

// =====================================================================
// GO
// =====================================================================
init();
</script>
</body>
</html>
